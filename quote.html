<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ede6d6" id="theme-color-meta">
<title>Tangy Nature LLC — Quote Tool</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&family=Source+Serif+4:wght@500;600&display=swap" rel="stylesheet">
<script>
(function(){
  try {
    var saved = localStorage.getItem('tn_theme');
    if (saved === 'light' || saved === 'dark') document.documentElement.setAttribute('data-theme', saved);
  } catch (e) {}
})();
</script>
<style>
/* ─── THEME TOKENS — mirrors tangy-nature-app/styles.css ────────
   Kept in sync by hand: this page is served standalone by the local
   Python quote server and can't link the app's styles.css or share
   its localStorage (different origin), so the palette is copied here. */
:root, :root[data-theme="light"] {
  --bg: #ede6d6; --bg2: #f8f4e9; --bg3: #f2ecdd; --bg4: #e5ddc8;
  --amber: #3f5d3a; --amber2: #344d30; --amber-dim: rgba(63,93,58,0.14); --amber-dim2: rgba(63,93,58,0.07);
  --on-accent: #f8f4e9;
  --text: #2b2a24; --text2: #5c5747; --text3: #8f8a7a;
  --green: #2b6b3f; --green-dim: rgba(43,107,63,0.14);
  --red: #96402c; --red-dim: rgba(150,64,44,0.14);
  --blue: #3f6785; --blue-dim: rgba(63,103,133,0.14);
  --border: rgba(43,42,36,0.14); --border2: rgba(43,42,36,0.24);
  --shadow-color: rgba(43,42,36,0.22);
  --radius: 12px; --topbar-h: 56px;
}
@media (prefers-color-scheme: dark) {
  :root:not([data-theme]) {
    --bg: #1b1f18; --bg2: #242922; --bg3: #20241d; --bg4: #2c322a;
    --amber: #85a874; --amber2: #96b787; --amber-dim: rgba(133,168,116,0.16); --amber-dim2: rgba(133,168,116,0.08);
    --on-accent: #1b1f18;
    --text: #ece6d6; --text2: #b7b2a0; --text3: #8f9184;
    --green: #7fc796; --green-dim: rgba(127,199,150,0.16);
    --red: #d68a71; --red-dim: rgba(214,138,113,0.16);
    --blue: #8bb4d6; --blue-dim: rgba(139,180,214,0.16);
    --border: rgba(237,230,210,0.10); --border2: rgba(237,230,210,0.18);
    --shadow-color: rgba(0,0,0,0.45);
  }
}
:root[data-theme="dark"] {
  --bg: #1b1f18; --bg2: #242922; --bg3: #20241d; --bg4: #2c322a;
  --amber: #85a874; --amber2: #96b787; --amber-dim: rgba(133,168,116,0.16); --amber-dim2: rgba(133,168,116,0.08);
  --on-accent: #1b1f18;
  --text: #ece6d6; --text2: #b7b2a0; --text3: #8f9184;
  --green: #7fc796; --green-dim: rgba(127,199,150,0.16);
  --red: #d68a71; --red-dim: rgba(214,138,113,0.16);
  --blue: #8bb4d6; --blue-dim: rgba(139,180,214,0.16);
  --border: rgba(237,230,210,0.10); --border2: rgba(237,230,210,0.18);
  --shadow-color: rgba(0,0,0,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom,0);transition:background .15s,color .15s;}

/* Nav */
.navbar{background:var(--bg2);border-bottom:0.5px solid var(--border2);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:640px;margin:0 auto;padding:0 16px;height:var(--topbar-h);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.nav-brand{display:flex;align-items:center;gap:8px;min-width:0;}
.nav-logo{width:30px;height:30px;flex-shrink:0;}
.nav-company{font-size:14px;font-weight:600;font-family:var(--font-serif,'DM Sans',sans-serif);white-space:nowrap;}
.nav-divider{width:1px;height:16px;background:var(--border2);margin:0 6px;flex-shrink:0;}
.nav-app{font-size:12px;color:var(--text3);white-space:nowrap;}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.nav-live{font-size:12px;color:var(--text3);}
.icon-btn{width:28px;height:28px;border-radius:50%;background:none;border:0.5px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:active{background:var(--bg3);}
.stop-btn{padding:4px 12px;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--red-dim);border-radius:6px;color:var(--red);cursor:pointer;font-family:inherit;white-space:nowrap;}
.stop-btn:active{background:var(--red-dim);}

@media (max-width:420px){
  .nav-app,.nav-divider,.nav-live{display:none;}
  .nav-inner{padding:0 12px;}
}

/* Content */
.wrap{max-width:640px;margin:0 auto;padding:16px;}

/* Search area */
.search-box{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px;margin-bottom:12px;}
.search-input-wrap{position:relative;margin-bottom:10px;}
.search-input{width:100%;padding:12px 14px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:15px;outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--amber);}
.search-input::placeholder{color:var(--text3);}
.search-row{display:flex;gap:8px;}
.cond-select{flex:1;padding:12px 10px;background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;color:var(--text);font-size:14px;font-weight:500;outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s;}
.cond-select:focus{border-color:var(--amber);}
.btn-add{flex:1;padding:12px;background:var(--amber);color:var(--on-accent);border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-add:active{background:var(--amber2);}

/* Dropdown */
#db-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;z-index:100;overflow:hidden;box-shadow:0 8px 24px var(--shadow-color);max-height:200px;overflow-y:auto;}
.dd-item{padding:11px 14px;cursor:pointer;font-size:14px;border-bottom:0.5px solid var(--border);}
.dd-item:last-child{border-bottom:none;}
.dd-item:active,.dd-item.dd-active{background:var(--border);}
.dd-sku{font-size:11px;color:var(--text3);margin-left:6px;}

/* Recent */
.recent-wrap{margin-bottom:12px;}
.recent-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:600;margin-bottom:6px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:5px 12px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;font-size:12px;cursor:pointer;color:var(--text2);}
.chip:active{border-color:var(--amber);color:var(--text);}

/* Queue */
.queue-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.queue-head{padding:10px 14px;background:var(--bg3);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;}
.queue-title{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);}
.btn-quote{padding:9px 20px;background:var(--amber);border:none;border-radius:8px;color:var(--on-accent);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-quote:disabled{opacity:.4;cursor:not-allowed;}
.btn-quote:not(:disabled):active{background:var(--amber2);}
.queue-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:0.5px solid var(--border);}
.queue-item:last-child{border-bottom:none;}
.qi-name{flex:1;font-size:14px;font-weight:500;min-width:0;}
.qi-cond{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--blue-dim);color:var(--blue);flex-shrink:0;}
.qi-remove{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:2px 4px;line-height:1;}
.queue-empty{padding:20px 14px;text-align:center;color:var(--text2);font-size:13px;}

/* Results */
.result-card{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;}
.result-head{padding:10px 14px;background:var(--bg3);border-bottom:0.5px solid var(--border);}
.result-title{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:8px;}
.result-controls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
.copy-btn{padding:5px 14px;font-size:12px;font-weight:600;background:transparent;border:0.5px solid var(--border2);border-radius:6px;color:var(--text2);cursor:pointer;font-family:inherit;}
.copy-btn.copied{border-color:var(--green);color:var(--green);}
.toggle-group{display:flex;align-items:center;gap:5px;}
.toggle-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.toggle-btn{padding:4px 10px;font-size:11px;font-weight:600;background:transparent;border:0.5px solid var(--border2);border-radius:5px;color:var(--text2);cursor:pointer;font-family:inherit;}
.toggle-btn.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim2);}

/* Mobile result cards instead of table */
.result-items{padding:0;}
.result-item{padding:14px;border-bottom:0.5px solid var(--border);}
.result-item:last-child{border-bottom:none;}
.result-item-name{font-size:14px;font-weight:500;margin-bottom:4px;line-height:1.3;}
.result-item-sub{font-size:11px;color:var(--text3);margin-bottom:10px;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.price-cell{background:var(--bg3);border-radius:8px;padding:8px 10px;}
.price-cell.tn-ti{background:var(--amber-dim2);border:0.5px solid var(--amber-dim);}
.price-cell.tn-sell{background:var(--green-dim);border:0.5px solid var(--green-dim);}
.price-label{font-size:9px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.price-label.amber{color:var(--amber);}
.price-label.green{color:var(--green);}
.price-value{font-size:15px;font-weight:600;font-family:'DM Mono',monospace;}
.price-value.amber{color:var(--amber);}
.price-value.green{color:var(--green);}
.cond-pill{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:var(--amber-dim);color:var(--amber);margin-right:6px;}
.save-db-btn{padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;border:none;cursor:pointer;background:var(--amber);color:var(--on-accent);}
.save-db-btn.saved{background:var(--border2);color:var(--text3);cursor:default;}
.keh-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.hide-retail .keh-row,.hide-retail .price-cell.keh,.hide-tn-sell .price-cell.tn-sell{display:none;}

/* Total row */
.result-total{padding:12px 14px;background:var(--bg3);border-top:0.5px solid var(--border2);display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.total-cell{padding:8px 10px;border-radius:8px;background:var(--bg2);}
.total-cell.amber{background:var(--amber-dim2);border:0.5px solid var(--amber-dim);}
.total-cell.green{background:var(--green-dim);border:0.5px solid var(--green-dim);}

/* Fail list */
.fail-list{border-top:0.5px solid var(--border);}
.fail-item{padding:10px 14px;border-bottom:0.5px solid var(--border);font-size:12px;color:var(--text2);}
.fail-item strong{color:var(--red);}

/* Loading */
.loading-state{padding:36px;text-align:center;color:var(--text2);font-size:14px;}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <div class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 4 Q96 4 96 50 Q96 96 50 96 Q4 96 4 50 Q4 4 50 4Z" fill="white" stroke="#6aaac8" stroke-width="3.5"/>
        <rect x="24" y="34" width="52" height="36" rx="6" fill="none" stroke="#6aaac8" stroke-width="3.5"/>
        <rect x="38" y="27" width="12" height="9" rx="3" fill="none" stroke="#6aaac8" stroke-width="3"/>
        <circle cx="50" cy="52" r="11" fill="none" stroke="#6aaac8" stroke-width="3.5"/>
        <circle cx="50" cy="52" r="6" fill="#6aaac8"/>
        <circle cx="67" cy="40" r="3.5" fill="#6aaac8"/>
      </svg>
      <span class="nav-company">Tangy Nature LLC</span>
      <div class="nav-divider"></div>
      <span class="nav-app">Quote Tool</span>
    </div>
    <div class="nav-right">
      <div style="display:flex;align-items:center;gap:5px;"><div class="nav-dot"></div><span class="nav-live">Live</span></div>
      <button class="icon-btn" id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
      <button class="stop-btn" onclick="stopServer()">Stop</button>
    </div>
  </div>
</nav>

<div class="wrap">
  <!-- Search -->
  <div class="search-box">
    <div class="search-input-wrap">
      <input type="text" id="q" class="search-input" placeholder="e.g. Sony A7 IV, Canon R5…" autocomplete="off" autocorrect="off" autocapitalize="none">
      <div id="db-dropdown"></div>
    </div>
    <div class="search-row">
      <select id="cond" class="cond-select">
        <option value="Like New Minus">Like New</option>
        <option value="Excellent Plus">Excellent</option>
        <option value="Excellent">Good</option>
        <option value="Bargain">Well Used</option>
      </select>
      <button class="btn-add" onclick="addItem()">+ Add to Quote</button>
    </div>
  </div>

  <!-- Recent -->
  <div id="hist-wrap" class="recent-wrap" style="display:none;">
    <div class="recent-label">Recent</div>
    <div class="chips" id="chips"></div>
  </div>

  <!-- Queue -->
  <div class="queue-card">
    <div class="queue-head">
      <span class="queue-title">Items to Quote (<span id="item-count">0</span>)</span>
      <button class="btn-quote" id="quote-btn" onclick="getQuote()" disabled>Get Quote</button>
    </div>
    <div id="queue-list"><div class="queue-empty">Add items above</div></div>
  </div>

  <!-- Results -->
  <div id="result-area"></div>
</div>

<script>
// ─── THEME (light/dark) ─────────────────────────────────────
const ICON_MOON = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M13 8.7A5.3 5.3 0 116.3 2 4.3 4.3 0 0013 8.7z" stroke-linejoin="round"/></svg>';
const ICON_SUN = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4" stroke-linecap="round"/></svg>';
function currentTheme(){
  const explicit = document.documentElement.getAttribute('data-theme');
  if (explicit) return explicit;
  return (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
}
function updateThemeToggleIcon(mode){
  const btn = document.getElementById('theme-toggle-btn');
  if (btn) btn.innerHTML = mode === 'dark' ? ICON_SUN : ICON_MOON;
}
function applyTheme(mode){
  document.documentElement.setAttribute('data-theme', mode);
  try { localStorage.setItem('tn_theme', mode); } catch (e) {}
  updateThemeToggleIcon(mode);
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.setAttribute('content', mode === 'dark' ? '#1b1f18' : '#ede6d6');
}
function toggleTheme(){ applyTheme(currentTheme() === 'dark' ? 'light' : 'dark'); }
updateThemeToggleIcon(currentTheme());

const HK='keh_quote_history';
const COND_LABEL={"Like New Minus":"Like New","Excellent Plus":"Excellent","Excellent":"Good","Bargain":"Well Used"};
let items=[],nextId=1,_lastResult=null,_tnRound=25,_showRetail=false,_showTnSell=false;

function getHist(){try{return JSON.parse(localStorage.getItem(HK)||'[]');}catch{return[];}}
function saveHist(q){localStorage.setItem(HK,JSON.stringify([q,...getHist().filter(x=>x!==q)].slice(0,8)));renderHist();}
function renderHist(){
  const h=getHist(),w=document.getElementById('hist-wrap'),c=document.getElementById('chips');
  if(!h.length){w.style.display='none';return;}
  w.style.display='block';
  c.innerHTML=h.map(q=>`<span class="chip" onclick="prefill('${q.replace(/'/g,"\\'")}')">${q}</span>`).join('');
}
function prefill(q){document.getElementById('q').value=q;document.getElementById('q').focus();}

function addItem(){
  const qEl=document.getElementById('q'),q=qEl.value.trim();
  if(!q){qEl.focus();return;}
  items.push({id:nextId++,query:q,condition:document.getElementById('cond').value});
  saveHist(q); qEl.value=''; qEl.focus(); hideDbDropdown(); renderQueue();
}
function removeItem(id){items=items.filter(i=>i.id!==id);renderQueue();}
function renderQueue(){
  const list=document.getElementById('queue-list');
  const btn=document.getElementById('quote-btn');
  document.getElementById('item-count').textContent=items.length;
  btn.disabled=!items.length;
  if(!items.length){list.innerHTML='<div class="queue-empty">Add items above</div>';return;}
  list.innerHTML=items.map(i=>`<div class="queue-item">
    <span class="qi-name">${i.query}</span>
    <span class="qi-cond">${COND_LABEL[i.condition]||i.condition}</span>
    <button class="qi-remove" onclick="removeItem(${i.id})">✕</button>
  </div>`).join('');
}

async function getQuote(){
  if(!items.length)return;
  const btn=document.getElementById('quote-btn');
  btn.disabled=true;btn.textContent='Getting quote…';
  document.getElementById('result-area').innerHTML=`<div class="result-card"><div class="loading-state"><span class="spin"></span>Submitting ${items.length} item(s)…<div style="font-size:12px;color:var(--text3);margin-top:8px">~20–30 seconds</div></div></div>`;
  try{
    const res=await fetch('/api/quote',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:items.map(i=>({query:i.query,condition:i.condition}))})}).then(r=>r.json());
    renderResult(res);
  }catch(e){
    document.getElementById('result-area').innerHTML=`<div class="result-card"><div class="loading-state" style="color:var(--red)">Error: ${e.message}</div></div>`;
  }finally{btn.disabled=!items.length;btn.textContent='Get Quote';}
}

function roundTo(p,n){return n?Math.round(p/n)*n:Math.round(p);}
function fmt(v){return v!=null?'$'+Math.round(v).toLocaleString():'—';}
function fmtTN(v){return v!=null?fmt(roundTo(v,_tnRound)):'—';}

function setTnRound(n,btn){
  _tnRound=n;
  document.querySelectorAll('.toggle-btn[data-round]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(_lastResult)renderResult(_lastResult);
}
function setShowRetail(btn){
  _showRetail=!_showRetail;btn.classList.toggle('active',_showRetail);btn.textContent=_showRetail?'On':'Off';
  document.querySelectorAll('.result-card-inner').forEach(c=>c.classList.toggle('hide-retail',!_showRetail));
}
function setShowTnSell(btn){
  _showTnSell=!_showTnSell;btn.classList.toggle('active',_showTnSell);btn.textContent=_showTnSell?'On':'Off';
  document.querySelectorAll('.result-card-inner').forEach(c=>c.classList.toggle('hide-tn-sell',!_showTnSell));
}

function renderResult(res){
  _lastResult=res;
  const ra=document.getElementById('result-area');
  if(!res.found){
    ra.innerHTML=`<div class="result-card"><div class="loading-state" style="color:var(--red)">⚠️ ${res.error||'No quote returned'}</div></div>`;
    return;
  }
  const lines=res.quote_lines||[];
  const fails=(res.items_failed||[]);
  const sumRaw=key=>lines.reduce((s,l)=>s+(l[key]||0),0)||null;
  const tKehSell=sumRaw('keh_sell_price'),tKehTi=sumRaw('price'),tTnSell=sumRaw('tn_sell_price'),tTnTi=sumRaw('tn_trade_in_price');

  const itemsHtml=lines.map(l=>{
    const name=l.matched||l.name||l.query||'—';
    const sub=(l.matched&&l.query&&l.matched.toLowerCase()!==l.query.toLowerCase())?`<div style="font-size:11px;color:var(--text3);margin-top:2px">searched: ${l.query}</div>`:'';
    const saveProductName=(l.matched||l.query||'').replace(/'/g,"\\'");
    const savedBtn=l.in_db
      ?`<button class="save-db-btn saved" disabled>Saved ✓</button>`
      :`<button class="save-db-btn" onclick="saveToDb(this,'${saveProductName}','')">Save</button>`;
    return `<div class="result-item">
      <div class="result-item-name">${name}${sub}</div>
      <div class="result-item-sub">
        <span class="cond-pill">${COND_LABEL[l.condition]||l.condition||'—'}</span>${savedBtn}
      </div>
      <div class="price-grid keh-row">
        <div class="price-cell keh">
          <div class="price-label">KEH Sell</div>
          <div class="price-value">${fmt(l.keh_sell_price)}</div>
        </div>
        <div class="price-cell keh">
          <div class="price-label">KEH Trade-In</div>
          <div class="price-value">${fmt(l.price)}</div>
        </div>
      </div>
      <div class="price-grid" style="margin-top:6px">
        <div class="price-cell tn-sell">
          <div class="price-label green">TN Sell</div>
          <div class="price-value green">${fmtTN(l.tn_sell_price)}</div>
        </div>
        <div class="price-cell tn-ti">
          <div class="price-label amber">TN Trade-In</div>
          <div class="price-value amber">${fmtTN(l.tn_trade_in_price)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  const failHtml=fails.length?`<div class="fail-list">${fails.map(f=>`<div class="fail-item"><strong>Not quoted:</strong> ${f.query} — ${f.error||'unknown'}</div>`).join('')}</div>`:'';

  const totalHtml=lines.length>1?`<div class="result-total">
    <div class="total-cell green">
      <div class="price-label green" style="font-size:9px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;">Total TN Sell</div>
      <div class="price-value green" style="font-size:16px;">${fmtTN(tTnSell)}</div>
    </div>
    <div class="total-cell amber">
      <div class="price-label amber" style="font-size:9px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;">Total TN Trade-In</div>
      <div class="price-value amber" style="font-size:16px;">${fmtTN(tTnTi)}</div>
    </div>
  </div>`:'';

  const hideRetailClass=_showRetail?'':'hide-retail';
  const hideTnSellClass=_showTnSell?'':'hide-tn-sell';

  ra.innerHTML=`<div class="result-card">
    <div class="result-head">
      <span class="result-title">Live Quote — ${lines.length} item(s)</span>
      <div class="result-controls">
        <button class="copy-btn" onclick="copyQuote(this)">Copy</button>
        <div class="toggle-group">
          <span class="toggle-label">Retail</span>
          <button class="toggle-btn${_showRetail?' active':''}" onclick="setShowRetail(this)">${_showRetail?'On':'Off'}</button>
        </div>
        <div class="toggle-group">
          <span class="toggle-label">TN Sell</span>
          <button class="toggle-btn${_showTnSell?' active':''}" onclick="setShowTnSell(this)">${_showTnSell?'On':'Off'}</button>
        </div>
        <div class="toggle-group">
          <span class="toggle-label">Round</span>
          <button class="toggle-btn${_tnRound===0?' active':''}" data-round onclick="setTnRound(0,this)">None</button>
          <button class="toggle-btn${_tnRound===5?' active':''}" data-round onclick="setTnRound(5,this)">$5</button>
          <button class="toggle-btn${_tnRound===10?' active':''}" data-round onclick="setTnRound(10,this)">$10</button>
          <button class="toggle-btn${_tnRound===25?' active':''}" data-round onclick="setTnRound(25,this)">$25</button>
        </div>
      </div>
    </div>
    <div class="result-card-inner ${hideRetailClass} ${hideTnSellClass}">
      <div class="result-items">${itemsHtml}</div>
      ${totalHtml}
      ${failHtml}
    </div>
  </div>`;
}

// DB Autocomplete
let _ddTimer=null,_ddIndex=-1;
const _qInput=document.getElementById('q');
const _dd=document.getElementById('db-dropdown');
function hideDbDropdown(){_dd.style.display='none';_dd.innerHTML='';_ddIndex=-1;}
function _ddItems(){return[..._dd.querySelectorAll('.dd-item')];}
function _ddSetActive(idx){
  const its=_ddItems();its.forEach(i=>i.classList.remove('dd-active'));
  _ddIndex=Math.max(-1,Math.min(idx,its.length-1));
  if(_ddIndex>=0)its[_ddIndex].classList.add('dd-active');
}
_qInput.addEventListener('input',()=>{
  clearTimeout(_ddTimer);
  const v=_qInput.value.trim();
  if(v.length<2){hideDbDropdown();return;}
  _ddTimer=setTimeout(async()=>{
    try{
      const res=await fetch('/api/db/search?q='+encodeURIComponent(v)).then(r=>r.json());
      if(!res.length){hideDbDropdown();return;}
      _dd.innerHTML=res.slice(0,8).map(p=>`<div class="dd-item" data-name="${p.product_name.replace(/"/g,'&quot;')}">${p.product_name}<span class="dd-sku">${p.sku}${p.brand?' · '+p.brand:''}</span></div>`).join('');
      _dd.style.display='block';_ddIndex=-1;
    }catch{hideDbDropdown();}
  },220);
});
_qInput.addEventListener('keydown',e=>{
  const its=_ddItems();const ddOpen=_dd.style.display!=='none'&&its.length>0;
  if(e.key==='ArrowDown'&&ddOpen){e.preventDefault();_ddSetActive(_ddIndex+1);}
  else if(e.key==='ArrowUp'&&ddOpen){e.preventDefault();_ddSetActive(_ddIndex-1);}
  else if((e.key==='Enter'||e.key==='Tab')&&ddOpen&&_ddIndex>=0){e.preventDefault();_qInput.value=its[_ddIndex].dataset.name;hideDbDropdown();}
  else if(e.key==='Enter'){hideDbDropdown();addItem();}
  else if(e.key==='Escape'){hideDbDropdown();}
});
_dd.addEventListener('mousedown',e=>{
  const item=e.target.closest('.dd-item');
  if(item&&item.dataset.name){e.preventDefault();_qInput.value=item.dataset.name;hideDbDropdown();_qInput.focus();}
});
document.addEventListener('click',e=>{if(!_qInput.contains(e.target)&&!_dd.contains(e.target))hideDbDropdown();});

// Save to DB
async function saveToDb(btn,productName){
  if(btn.disabled)return;
  btn.textContent='Saving…';btn.disabled=true;
  try{
    const res=await fetch('/api/db/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({product_name:productName})}).then(r=>r.json());
    if(res.ok){btn.classList.add('saved');btn.textContent='Saved ✓';}
    else{btn.disabled=false;btn.textContent='Save';alert('Save failed: '+(res.error||'unknown'));}
  }catch{btn.disabled=false;btn.textContent='Save';}
}

// Copy Quote
function copyQuote(btn){
  if(!_lastResult||!_lastResult.quote_lines)return;
  const lines=_lastResult.quote_lines;
  const COND={"Like New Minus":"Like New","Excellent Plus":"Excellent","Excellent":"Good","Bargain":"Well Used"};
  const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  let text=`Live Quote — ${date}\n${'='.repeat(48)}\n\n`;
  lines.forEach(l=>{
    const name=l.matched||l.name||l.query||'—';
    const cond=COND[l.condition]||l.condition||'—';
    text+=`${name}\n  Condition : ${cond}\n`;
    if(_showRetail){text+=`  KEH Sell  : ${fmt(l.keh_sell_price)}\n  KEH Trade : ${fmt(l.price)}\n`;}
    if(_showTnSell){text+=`  TN Sell   : ${fmtTN(l.tn_sell_price)}\n`;}
    text+=`  TN Trade  : ${fmtTN(l.tn_trade_in_price)}\n\n`;
  });
  text+=`${'-'.repeat(48)}\n`;
  if(_showTnSell)text+=`TN Sell Total    : ${fmtTN(lines.reduce((s,l)=>s+(l.tn_sell_price||0),0))}\n`;
  text+=`TN Trade Total   : ${fmtTN(lines.reduce((s,l)=>s+(l.tn_trade_in_price||0),0))}\n`;
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);}).catch(()=>alert('Copy failed.'));
}

// Stop Server
async function stopServer(){
  if(!confirm('Stop the Quote Tool server?'))return;
  try{await fetch('/api/stop',{method:'POST'});}catch{}
  document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;background:var(--bg);color:var(--text3);font-size:15px">Server stopped. Close this tab.</div>`;
}

renderHist();renderQueue();
